<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Character AI Chat</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0b0e11; color: white; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 15px; border-radius: 18px; max-width: 70%; line-height: 1.4; }
        .user { background: #3b82f6; align-self: flex-end; }
        .ai { background: #2d3748; align-self: flex-start; border: 1px solid #4a5568; }
        #input-container { background: #1a202c; padding: 20px; display: flex; gap: 10px; border-top: 1px solid #2d3748; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid #4a5568; background: #2d3748; color: white; outline: none; }
        button { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2563eb; }
    </style>
</head>
<body>
    <div id="chat"></div>
    <div id="input-container">
        <input type="text" id="userInput" placeholder="Type a message...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('userInput');

        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;

            // 1. Add User Message to UI
            chat.innerHTML += `<div class="msg user">${text}</div>`;
            input.value = '';
            chat.scrollTop = chat.scrollHeight;

            // 2. Call the Python Backend
            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: text,
                    character_name: "Captain Hook",
                    personality: "Vindictive, obsessive, but strangely polite."
                })
            });

            const data = await response.json();

            // 3. Add AI Reply to UI
            chat.innerHTML += `<div class="msg ai">${data.reply}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }

        // Send message on Enter key
        input.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });
    </script>
</body>
</html>
